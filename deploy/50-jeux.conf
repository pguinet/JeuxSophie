# 50-jeux.conf — configuration lighttpd pour les jeux de Sophie.
#
# Installation (voir deploy/README.md) :
#   sudo cp deploy/50-jeux.conf /etc/lighttpd/conf-available/
#   sudo lighttpd-enable-mod jeux
#   sudo systemctl restart lighttpd
#
# NB : le docroot (/var/www/jeux) se règle dans /etc/lighttpd/lighttpd.conf
# via server.document-root — lighttpd refuse de réassigner cette variable ici.

# Modules nécessaires aux en-têtes personnalisés
server.modules += ( "mod_setenv" )

# NB : pas de bloc mimetype.assign ici — la config par défaut
# (/usr/share/lighttpd/create-mime.conf.pl) mappe déjà .js => text/javascript,
# ce qui suffit pour les <script type="module">. Réassigner ces clés ferait
# échouer lighttpd (« Duplicate array-key »).

# Politique de cache en deux temps.
#
# 1. /vendor/ : assets à version figée dans le chemin (ex. Three.js 1,3 Mo),
#    donc immuables. On les cache « pour toujours » : la tablette de Sophie ne
#    les re-télécharge qu'une seule fois, plus d'écran noir à chaque lancement.
#    Une nouvelle version = un nouveau chemin, donc jamais de cache périmé.
#
# 2. Tout le reste (code des jeux, HTML) : "no-cache" force une revalidation à
#    chaque requête (GET conditionnel → 304 si rien n'a bougé). Un simple
#    rafraîchissement suffit donc à voir un déploiement, sans re-télécharger si
#    inchangé. On évite volontairement "no-store", qui interdisait tout cache et
#    obligeait à tout retélécharger à chaque fois.
$HTTP["url"] =~ "^/vendor/" {
    setenv.add-response-header += (
        "Cache-Control" => "public, max-age=31536000, immutable"
    )
}
else {
    setenv.add-response-header += (
        "Cache-Control" => "no-cache"
    )
}
