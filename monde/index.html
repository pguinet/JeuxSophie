<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Le monde de Sophie</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { min-height: 100%; }
        body {
            font-family: 'Comic Sans MS', 'Baloo 2', 'Segoe UI', system-ui, sans-serif;
            background: #000;                 /* fond noir par défaut */
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4vmin;
            padding: 6vmin 4vmin;
            text-align: center;
            -webkit-user-select: none;
            user-select: none;
            transition: background .35s ease;
        }
        h1 {
            font-size: clamp(34px, 9vmin, 80px);
            color: #ff5fa2;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, .55);
        }
        p.sub { font-size: clamp(16px, 3vmin, 28px); opacity: .9; }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 3vmin;
            width: min(460px, 88vw);
        }
        button.big {
            font-family: inherit;
            cursor: pointer;
            border: none;
            color: #fff;
            border-radius: 28px;
            padding: 4.5vmin 3vmin;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2.5vmin;
            font-size: clamp(20px, 4.4vmin, 34px);
            font-weight: bold;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, .3);
            box-shadow: 0 6px 0 rgba(0, 0, 0, .35);
            transition: transform .12s, box-shadow .12s, filter .12s;
        }
        button.big .ico { font-size: clamp(30px, 7vmin, 52px); }
        button.big:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0, 0, 0, .35); }
        @media (hover: hover) { button.big:hover { transform: translateY(-4px); } }

        .perso { background: #cc5de8; }
        .jouer { background: #4dabf7; }
        .amis  { background: #868e96; }          /* verrouillé : couleur grise */
        button.locked { filter: grayscale(.3); }

        /* Choix de la couleur du fond */
        .palette-label { font-size: clamp(15px, 3vmin, 22px); opacity: .85; margin-top: 2vmin; }
        .palette {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2.4vmin;
            width: min(460px, 88vw);
        }
        .swatch {
            width: clamp(38px, 9vmin, 56px);
            height: clamp(38px, 9vmin, 56px);
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid rgba(255, 255, 255, .55);
            box-shadow: 0 3px 0 rgba(0, 0, 0, .35);
            transition: transform .12s;
        }
        .swatch:active { transform: scale(.9); }
        @media (hover: hover) { .swatch:hover { transform: scale(1.12); } }
        .swatch.selected { border-color: #fff; border-width: 5px; transform: scale(1.15); }
    </style>
</head>
<body>
    <h1>Mon monde 🌈</h1>
    <p class="sub">Qu'est-ce qu'on fait aujourd'hui ?</p>

    <div class="menu">
        <button class="big perso" onclick="location.href='../habille/?from=monde'">
            <span class="ico">🎨</span><span>Mon personnage</span>
        </button>
        <button class="big jouer" onclick="location.href='jouer.html'">
            <span class="ico">🎮</span><span>Jouer</span>
        </button>
        <button class="big amis locked" onclick="direBientot()">
            <span class="ico">🔒</span><span>Inviter des amis</span>
        </button>
    </div>

    <div class="palette-label">🎨 Choisis la couleur du fond :</div>
    <div class="palette" id="palette"></div>

    <p class="sub" id="bientot" style="min-height:1.4em; color:#ffd43b; transition:opacity .3s; opacity:0;"></p>

    <script>
        // Les couleurs proposées (la première, le noir, est celle de base)
        const COULEURS = [
            { nom: 'Noir',      valeur: '#000000' },
            { nom: 'Rose',      valeur: '#ff5fa2' },
            { nom: 'Bleu',      valeur: '#4dabf7' },
            { nom: 'Violet',    valeur: '#9775fa' },
            { nom: 'Vert',      valeur: '#51cf66' },
            { nom: 'Orange',    valeur: '#ff922b' },
            { nom: 'Jaune',     valeur: '#ffd43b' },
            { nom: 'Turquoise', valeur: '#22b8cf' },
        ];
        const CLE = 'monde_fond';

        const palette = document.getElementById('palette');

        function appliquer(valeur) {
            document.body.style.background = valeur;
            document.querySelectorAll('.swatch').forEach(function (s) {
                s.classList.toggle('selected', s.dataset.valeur === valeur);
            });
        }

        COULEURS.forEach(function (c) {
            const s = document.createElement('div');
            s.className = 'swatch';
            s.style.background = c.valeur;
            s.dataset.valeur = c.valeur;
            s.title = c.nom;
            s.setAttribute('aria-label', c.nom);
            s.addEventListener('click', function () {
                appliquer(c.valeur);
                try { localStorage.setItem(CLE, c.valeur); } catch (e) {}
            });
            palette.appendChild(s);
        });

        // Au démarrage : couleur gardée en mémoire, sinon noir
        let choix = '#000000';
        try { choix = localStorage.getItem(CLE) || '#000000'; } catch (e) {}
        appliquer(choix);

        let bientotTimer = null;
        function direBientot() {
            const el = document.getElementById('bientot');
            el.textContent = 'Bientôt ! 👫 On pourra jouer avec des amis. 😊';
            el.style.opacity = '1';
            clearTimeout(bientotTimer);
            bientotTimer = setTimeout(function () { el.style.opacity = '0'; }, 2500);
        }
    </script>
</body>
</html>
