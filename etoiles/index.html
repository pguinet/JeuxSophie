<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Attrape les étoiles</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Comic Sans MS', 'Baloo 2', 'Segoe UI', system-ui, sans-serif;
            -webkit-user-select: none; user-select: none;
            touch-action: none;
        }
        #terrain {
            position: fixed; inset: 0; z-index: 0;
            background: linear-gradient(#6ec6f0 0%, #bfe9ff 42%, #d6f0b0 58%, #86cf63 100%);
            overflow: hidden;
        }
        /* soleil décoratif */
        #soleil {
            position: absolute; top: 5%; right: 8%;
            width: clamp(50px, 12vmin, 90px); height: clamp(50px, 12vmin, 90px);
            border-radius: 50%; background: #ffe14d;
            box-shadow: 0 0 34px 10px rgba(255, 225, 77, .55);
        }

        #hud {
            position: fixed; top: 0; left: 0; right: 0; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            gap: 3vw; padding: 2.4vmin 4vw;
            pointer-events: none;
        }
        .retour {
            pointer-events: auto;
            font-family: inherit; cursor: pointer; border: none; color: #fff;
            background: rgba(0, 0, 0, .28); border-radius: 20px;
            padding: 2.2vmin 4vw; font-size: clamp(15px, 3.4vmin, 22px); font-weight: bold;
            box-shadow: 0 4px 0 rgba(0, 0, 0, .3); white-space: nowrap;
        }
        .retour:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0, 0, 0, .3); }
        #score {
            font-size: clamp(24px, 6vmin, 44px); font-weight: bold; color: #fff;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, .35);
        }

        #joueur {
            position: absolute; top: 0; left: 0; z-index: 5;
            width: 66px; pointer-events: none; will-change: transform;
        }
        #joueur svg { width: 100%; height: auto; display: block;
            filter: drop-shadow(0 4px 3px rgba(0, 0, 0, .25)); }

        /* .star = position (translate) ; .star-in = clignotement (scale/rotate).
           Les deux transforms sont séparés pour ne pas se gêner. */
        .star {
            position: absolute; top: 0; left: 0; z-index: 3;
            pointer-events: none; will-change: transform, opacity;
            transition: opacity .2s;
        }
        .star-in {
            display: inline-block; font-size: 40px; line-height: 1;
            filter: drop-shadow(0 2px 2px rgba(0, 0, 0, .25));
            animation: twinkle 1.4s ease-in-out infinite;
        }
        @keyframes twinkle { 0%,100% { transform: scale(1) rotate(0); } 50% { transform: scale(1.18) rotate(8deg); } }

        .plus1 {
            position: absolute; z-index: 8; transform: translate(-50%, -50%);
            font-size: clamp(20px, 4vmin, 30px); font-weight: bold; color: #fff;
            text-shadow: 1px 1px 0 #f59f00; pointer-events: none;
            animation: floatup .8s ease-out forwards;
        }
        @keyframes floatup { from { opacity: 1; } to { opacity: 0; transform: translate(-50%, -160%); } }

        #consigne {
            position: fixed; left: 50%; bottom: 3vmin; transform: translateX(-50%);
            z-index: 9; color: #fff; font-size: clamp(14px, 3vmin, 20px);
            background: rgba(0, 0, 0, .28); padding: 1.4vmin 4vw; border-radius: 18px;
            text-align: center; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="terrain">
        <div id="soleil"></div>
        <div id="joueur"></div>
    </div>
    <div id="hud">
        <button class="retour" onclick="location.href='../monde/jouer.html'">⬅️ Retour</button>
        <div id="score">⭐ 0</div>
    </div>
    <div id="consigne">👆 Touche l'écran (ou les flèches) pour te promener et ramasser les étoiles !</div>

    <script type="module" src="js/game.js"></script>
</body>
</html>
